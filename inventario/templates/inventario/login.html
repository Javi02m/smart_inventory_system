{% extends 'inventario/base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-4">
        <div class="card card-custom p-4 shadow-lg">
            <div class="text-center mb-4">
                <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-3 shadow">
                    <i class="fa-solid fa-lock fa-2x"></i>
                </div>
                <h3 class="fw-bold text-dark">Iniciar Sesión</h3>
                <p class="text-muted small">Acceso exclusivo para el personal de bodega</p>
            </div>
            
            <form method="POST" id="loginForm">
                {% csrf_token %}
                {{ form.non_field_errors }}
                
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2 fw-bold shadow-sm">
                    <i class="fa-solid fa-key me-2"></i>Ingresar al Sistema
                </button>
            </form>
        </div>
    </div>
</div>

<!-- JavaScript para inyectarle clases Bootstrap a los inputs automáticos de Django -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll('#loginForm input:not([type="hidden"])');
        inputs.forEach(input => {
            input.classList.add("form-control");
            input.setAttribute("placeholder", "Ingrese " + input.name);
        });
    });
</script>
{% endblock %}
