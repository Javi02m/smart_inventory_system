{% extends 'inventario/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card card-custom p-4 shadow-sm">
            <h4 class="fw-bold text-dark mb-3">
                {% if form.instance.pk %}<i class="fa-solid fa-pen-to-square me-2 text-primary"></i>Editar Producto{% else %}<i class="fa-solid fa-box-open me-2 text-success"></i>Registrar Nuevo Producto{% endif %}
            </h4>
            <hr class="text-muted">
            
            <form method="POST" enctype="multipart/form-data" id="productoForm">
                {% csrf_token %}
                <div class="row g-3">
                    {% for field in form %}
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-secondary small">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'producto_list' %}" class="btn btn-light border px-4">Cancelar</a>
                    <button type="submit" class="btn btn-primary px-4 fw-bold">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll('#productoForm input, #productoForm select, #productoForm textarea');
        inputs.forEach(input => {
            if(input.setAttribute('type') !== 'checkbox') {
                input.classList.add("form-control");
            }
        });
    });
</script>
{% endblock %}
